version: '3.8'

services:
  mongodb:
    image: mongo:4.4
    container_name: inmocore-mongo
    ports:
      - "27017:27017"
    volumes:
      - inmocore_data:/data/db
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: inmocore-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "password"
    command: server /data --console-address ":9001"
    volumes:
      - inmocore_minio_data:/data
    restart: unless-stopped

volumes:
  inmocore_data:
  inmocore_minio_data:
